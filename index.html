
<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Container Totem</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#efefef;
}

.header{

background:
linear-gradient(90deg,#d50000,#ff3d00);

color:white;

padding:25px;

text-align:center;

box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.header h1{

font-size:42px;
font-weight:800;
}

.header p{

margin-top:5px;
font-size:20px;
}

.container{

width:95%;
margin:auto;
padding:20px;
}

.step{
display:none;
}

.active{
display:block;
}

h2{

margin-bottom:25px;
color:#333;
font-size:32px;
}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(320px,1fr));

gap:25px;
}

.card{

background:white;

border-radius:30px;

padding:35px;

text-align:center;

box-shadow:
0 6px 15px rgba(0,0,0,0.08);
}

.card .icon{

font-size:70px;
}

.card h3{

margin-top:20px;
font-size:30px;
color:#222;
}

.selected{

border:6px solid #ff9800;

background:#fff8e1;
}

.footer{

margin-top:40px;
text-align:center;
}

button{

background:#ff9800;

color:white;

border:none;

padding:20px 50px;

border-radius:20px;

font-size:28px;

font-weight:bold;

cursor:pointer;

transition:0.2s;
}

button:hover{

background:#f57c00;
}

input{

width:100%;

padding:25px;

border-radius:20px;

border:2px solid #ccc;

font-size:28px;
}

table{

width:100%;

background:white;

border-collapse:collapse;

margin-top:30px;

border-radius:20px;

overflow:hidden;
}

table th{

background:#ff9800;

color:white;

font-size:22px;
}

table td, table th{

padding:18px;

text-align:center;

border:1px solid #eee;
}

.quantidadeBox{

display:flex;

justify-content:center;

align-items:center;

gap:20px;

margin-top:30px;
}

.qtdBtn{

width:70px;

height:70px;

border-radius:50%;

border:none;

font-size:40px;

font-weight:bold;

color:white;

cursor:pointer;
}

.minus{
background:#e53935;
}

.plus{
background:#43a047;
}

.qtdValor{

font-size:50px;

font-weight:bold;
}

.topBar{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:20px;
}

.relatorioBtn{

background:#333;
font-size:20px;
padding:15px 25px;
}

.finalizarBtn{

width:100%;
}

</style>

</head>

<body>

<div class="header">

<h1>📦 TSA - GESTÃO DE ESTOQUE </h1>

<p>Registro de Entrada e Saída </p>

</div>


</div>

<!-- ETAPA 1 -->

<div class="step active"
id="step1">

<h2>  Entrada ou Saída ?</h2>

<div class="card"
onclick="selecionarTipo('ENTRADA', this)">

</div>

<div class="card"

<div class="icon">📤</div>

<h3>SAÍDA</h3>

</div>

</div>

<div class="footer">

<button onclick="proximo(2)">
Próximo
</button>

</div>

</div>

<!-- ETAPA 2 -->

<div class="step"
id="step2">

<h2>Quem retirou / colocou?</h2>

<div class="grid"
id="usuarios"></div>

<div class="footer">

<button onclick="voltar(1)">
Voltar
</button>

<button onclick="proximo(3)">
Próximo

Finalizar Registro

function abrirRelatorio(){

document.querySelectorAll('.step')
.forEach(s => s.classList.remove('active'));

document.getElementById('relatorio')
.classList.add('active');
}

function proximo(numero){

if(numero == 2){

alert(
"Selecione ENTRADA ou SAÍDA!"
);

return;
}
}

if(numero == 3){

if(dados.usuario == ""){

alert(
"Selecione quem retirou ou colocou!"
);

return;
}
}

document.querySelectorAll('.step')
.forEach(s => s.classList.remove('active'));

document.getElementById('step'+numero)
.classList.add('active');
}

function voltar(numero){

document.querySelectorAll('.step')
.forEach(s => s.classList.remove('active'));

document.getElementById('step'+numero)
.classList.add('active');
}

function selecionarTipo(tipo, el){

dados.tipo = tipo;

document.querySelectorAll('#step1 .card')
.forEach(c => c.classList.remove('selected'));

el.classList.add('selected');
}

function selecionarUsuario(nome, el){

dados.usuario = nome;

document.querySelectorAll('#usuarios .card')
.forEach(c => c.classList.remove('selected'));

el.classList.add('selected');
}

function alterarQtd(material, valor){

if(!dados.materiais[material]){

dados.materiais[material] = 0;
}

dados.materiais[material] += valor;

if(dados.materiais[material] < 0){

dados.materiais[material] = 0;
}

document.getElementById(
'qtd-'+material
).innerText = dados.materiais[material];
}

function finalizar(){

let materiaisSelecionados = [];

for(const [material, qtd] of Object.entries(dados.materiais)){

if(qtd > 0){

materiaisSelecionados.push({

material:material,
quantidade:qtd

});
}
}

if(materiaisSelecionados.length == 0){

alert("Selecione pelo menos 1 material!");

return;
}

let lista =

JSON.parse(
localStorage.getItem('estoque')
) || [];

materiaisSelecionados.forEach(item => {

lista.push({

tipo:dados.tipo,
usuario:dados.usuario,
material:item.material,
quantidade:item.quantidade,
data:new Date().toLocaleString()

});

});

localStorage.setItem(
'estoque',
JSON.stringify(lista)
);

enviarParaPlanilha(
materiaisSelecionados
);

alert("Registro salvo com sucesso!");

location.reload();
}

function mostrarRelatorio(){

JSON.parse(
localStorage.getItem('estoque')
) || [];

let html = `

<tr>

<th>Data</th>
<th>Tipo</th>
<th>Usuário</th>
<th>Material</th>
<th>Qtd</th>

</tr>
`;

[...lista].reverse().forEach(item => {

html += `

<tr>

<td>${item.data}</td>
<td>${item.tipo}</td>
<td>${item.usuario}</td>
<td>${item.material}</td>
<td>${item.quantidade}</td>

</tr>
`;
});

html += `</table>`;

document.getElementById('areaRelatorio')
.innerHTML = html;
}

function limparRelatorio(){

let senha =

document.getElementById('senha').value;

alert(
"Digite a senha correta para apagar o relatório!"
);

let confirmar = confirm(

"Tem certeza que deseja apagar TODOS os registros do relatório?"

);

if(!confirmar){

localStorage.removeItem('estoque');

document.getElementById('areaRelatorio')
.innerHTML = "";
