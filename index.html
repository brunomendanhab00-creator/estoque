<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Container Totem</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#efefef;}

.header{
background:linear-gradient(90deg,#d50000,#ff3d00);
color:white;padding:25px;text-align:center;
}

.container{width:95%;margin:auto;padding:20px;}
.step{display:none;}
.active{display:block;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
}

.card{
background:white;border-radius:20px;padding:20px;text-align:center;
cursor:pointer;
}

.selected{border:6px solid #ff9800;background:#fff8e1;}

.footer{margin-top:30px;text-align:center;}

button{
background:#ff9800;color:white;border:none;
padding:50px;border-radius:50px;font-size:50px;
cursor:pointer;
}

.quantidadeBox{
display:flex;justify-content:center;gap:20px;margin-top:15px;
}

.qtdBtn{
width:60px;height:60px;border-radius:50%;
font-size:30px;color:white;border:none;
}

.minus{background:#e53935;}
.plus{background:#43a047;}

.qtdValor{font-size:28px;font-weight:bold;}
</style>
</head>

<body>

<div class="header">
<h1>📦 TSA - GESTÃO DE ESTOQUE</h1>
<p>Registro de Entrada e Saída</p>
</div>

<div class="container">

<!-- STEP 1 -->
<div class="step active" id="step1">
<h2>Entrada ou Saída?</h2>

<div class="grid">
<div class="card" onclick="selecionarTipo('ENTRADA',this)">📥 ENTRADA</div>
<div class="card" onclick="selecionarTipo('SAIDA',this)">📤 SAÍDA</div>
</div>

<div class="footer">
<button onclick="proximo(2)">Próximo</button>
</div>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
<h2>Usuário</h2>
<div id="usuarios" class="grid"></div>

<div class="footer">
<button onclick="voltar(1)">Voltar</button>
<button onclick="proximo(3)">Próximo</button>
</div>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
<h2>Materiais</h2>
<div id="materiais" class="grid"></div>

<div class="footer">
<button onclick="finalizar()">Finalizar</button>
</div>
</div>

</div>

<script>

let dados = {tipo:"",usuario:"",materiais:{}};

const usuarios = [
"Alessandro","Breno","Bruno","Clayton","Fábio","Gabriel",
"Guilherme Felipe","Guilherme Mendanha","Jeferson","João",
"Jhonatas","Keyser","Rafael Monge","Richardson",
"Rogério","Thiago","Weliton"
];

const materiais = [
{nome:"Abraçadeira stalf", icon:""},
{nome:"Antena 2,4 fêmea", icon:""},
{nome:"Antena 2,4 macho", icon:""},
{nome:"Antena cogumelo", icon:""},
{nome:"Antena MEMS 3", icon:""},
{nome:"Box metal", icon:""},
{nome:"Box passagem de cabos", icon:""},
{nome:"Box plástico para mastro", icon:""},
{nome:"Cabo alimentação fêmea PTX", icon:""},
{nome:"Cabo alimentação MEMS", icon:""},
{nome:"Cabo ATM", icon:""},
{nome:"Cabo BPS", icon:""},
{nome:"Cabo de rede", icon:""},
{nome:"Cabo Dipper relay", icon:""},
{nome:"Cabo Ethernet com conector", icon:""},
{nome:"Cabo turck Ethernet", icon:""},
{nome:"Caixa de Rádio Branca", icon:""},
{nome:"Caixa de rádio modular", icon:""},
{nome:"Chicote ME4", icon:""},
{nome:"Chicote PTX", icon:""},
{nome:"Conduíte corrugado cinza", icon:""},
{nome:"Fonte modular", icon:""},
{nome:"Fusível 1", icon:""},
{nome:"Fusível 10", icon:""},
{nome:"Fusível 5", icon:""},
{nome:"Gampo em V", icon:""},
{nome:"Luva de conexão", icon:""},
{nome:"Módulo 3G GPS MEMS 4", icon:""},
{nome:"Olhal de alimentação", icon:""},
{nome:"Pneu carretinha", icon:""},
{nome:"POE AC/DC 48V", icon:""},
{nome:"POE AC/DC 55V", icon:""},
{nome:"PTX 10", icon:""},
{nome:"PTX 7", icon:""},
{nome:"Rádio bullet", icon:""},
{nome:"Suporte MEMS 4", icon:""},
{nome:"Suporte RAM Perfuratriz", icon:""},
{nome:"Suporte tela PTX HUB", icon:""},
{nome:"Switch CISCO IE4000", icon:""}
];

// navegação
function proximo(n){
if(n==2 && dados.tipo==""){
alert("Selecione ENTRADA ou SAÍDA!");
return;
}
if(n==3 && dados.usuario==""){
alert("Selecione o usuário!");
return;
}
trocar("step"+n);
}

function voltar(n){
trocar("step"+n);
}

function trocar(id){
document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// seleção
function selecionarTipo(tipo,el){
dados.tipo=tipo;
document.querySelectorAll('#step1 .card').forEach(c=>c.classList.remove('selected'));
el.classList.add('selected');
}

function selecionarUsuario(nome,el){
dados.usuario=nome;
document.querySelectorAll('#usuarios .card').forEach(c=>c.classList.remove('selected'));
el.classList.add('selected');
}

// quantidade
function alterarQtd(mat,val){
if(!dados.materiais[mat]) dados.materiais[mat]=0;
dados.materiais[mat]+=val;
if(dados.materiais[mat]<0) dados.materiais[mat]=0;
document.getElementById("qtd-"+mat).innerText=dados.materiais[mat];
}

// ✅ FINALIZAR CORRIGIDO
function finalizar(){

let selecionados=[];

for(const [m,q] of Object.entries(dados.materiais)){
if(q>0) selecionados.push({material:m,quantidade:q});
}

if(selecionados.length==0){
alert("Selecione pelo menos 1 material!");
return;
}

// ✅ ENVIO
enviarParaPlanilha(selecionados);

// ✅ mensagem
alert("✅ Registro enviado com sucesso!");

// ✅ CORREÇÃO CRÍTICA
setTimeout(()=>{
location.reload();
},1500);

}

// ✅ FETCH CORRETO
function enviarParaPlanilha(materiais){

materiais.forEach(item=>{

fetch("https://script.google.com/macros/s/AKfycbwd7Pbgkxn8qkFdHjwLfGYEUG85yLGWQRYMJw0waWcWXiN4aIKybOnENm0G4EGZoJbDMA/exec",{
method:"POST",
body:JSON.stringify({
tipo:dados.tipo,
usuario:dados.usuario,
material:item.material,
quantidade:item.quantidade,
data:new Date().toLocaleString()
})
});

});

}

// criar cards
function criarCards(){

let u=document.getElementById('usuarios');

usuarios.forEach(nome=>{
u.innerHTML+=`
<div class="card" onclick="selecionarUsuario('${nome}',this)">
👤<br>${nome}
</div>`;
});

let m=document.getElementById('materiais');

materiais.forEach(mat=>{
m.innerHTML+=`
<div class="card">
<h3>${mat.nome}</h3>
<div class="quantidadeBox">
<button class="qtdBtn minus" onclick="alterarQtd('${mat.nome}',-1)">-</button>
<div class="qtdValor" id="qtd-${mat.nome}">0</div>
<button class="qtdBtn plus" onclick="alterarQtd('${mat.nome}',1)">+</button>
</div>
</div>`;
});
}

criarCards();

</script>

</body>
</html>
