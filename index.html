<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Container Totem</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#efefef;}

.header{
background:linear-gradient(90deg,#d50000,#ff3d00);
color:white;padding:25px;text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.container{width:95%;margin:auto;padding:20px;}

.step{display:none;}
.active{display:block;}

h2{margin-bottom:25px;color:#333;font-size:32px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:30px;
padding:35px;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
cursor:pointer;
}

.selected{
border:6px solid #ff9800;
background:#fff8e1;
}

.footer{text-align:center;margin-top:30px;}

button{
background:#ff9800;color:white;border:none;
padding:20px 50px;border-radius:20px;
font-size:28px;font-weight:bold;cursor:pointer;
}

.minus{background:#e53935;}
.plus{background:#43a047;}

.qtdBtn{
width:70px;height:70px;border-radius:50%;
border:none;font-size:40px;color:white;
}
