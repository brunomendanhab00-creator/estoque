<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Container Totem</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}
body{background:#efefef;}

.header{
background:linear-gradient(90deg,#d50000,#ff3d00);
color:white;
padding:25px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.header h1{font-size:42px;font-weight:800;}
.header p{margin-top:5px;font-size:20px;}

.container{width:95%;margin:auto;padding:20px;}

.step{display:none;}
.active{display:block;}

h2{margin-bottom:25px;color:#333;font-size:32px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:30px;
padding:35px;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.card .icon{font-size:70px;}

.card h3{margin-top:20px;font-size:30px;color:#222;}

.selected{
border:6px solid #ff9800;
background:#fff8e1;
}

.footer{margin-top:40px;text-align:center;}

button{
background:#ff9800;
color:white;
border:none;
padding:20px 50px;
border-radius:20px;
font-size:28px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}
button:hover{background:#f57c00;}

input{
width:100%;
padding:25px;
border-radius:20px;
border:2px solid #ccc;
font-size:28px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
margin-top:30px;
border-radius:20px;
overflow:hidden;
}

table th{
background:#ff9800;
color:white;
font-size:22px;
}

table td, table th{
padding:18px;
text-align:center;
border:1px solid #eee;
}

.quantidadeBox{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-top:30px;
}

.qtdBtn{
width:70px;
height:70px;
border-radius:50%;
border:none;
font-size:40px;
font-weight:bold;
color:white;
cursor:pointer;
}

.minus{background:#e53935;}
.plus{background:#43a047;}

.qtdValor{font-size:50px;font-weight:bold;}

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.relatorioBtn{
background:#333;
font-size:20px;
padding:15px 25px;
}

.finalizarBtn{width:100%;}
</style>

</head>

<body>

<div class="header">
<h1>📦 TSA - GESTÃO DE ESTOQUE </h1>
<p>Registro de Entrada e Saída </p>
</div>

<div class="container">

<div class="topBar">
<h2>Controle de Estoque</h2>
<button class="relatorioBtn" onclick="abrirRelatorio()">Relatório</button>
</div>

<!-- RELATÓRIO -->
<div class="step active" id="relatorio">

<h2>Relatório do Estoque</h2>

<input type="password" id="senha" placeholder="Digite a senha">
<br><br>
<button onclick="verificarSenha()">Entrar</button>

<br><br>

<button style="background:#e53935;" onclick="limparRelatorio()">
Apagar Relatório
</button>

<br><br>

<button style="background:#4caf50;" onclick="exportarExcel()">
📊 Exportar para Excel
</button>

<div id="areaRelatorio"></div>

</div>

</div>

<script>

function verificarSenha(){
let senha = document.getElementById('senha').value;

if(senha != "1418"){
alert("Senha incorreta!");
return;
}

mostrarRelatorio();
}

function mostrarRelatorio(){

let lista = JSON.parse(localStorage.getItem('estoque')) || [];

let html = `
<table>
<tr>
<th>Data</th>
<th>Tipo</th>
<th>Usuário</th>
<th>Material</th>
<th>Qtd</th>
</tr>
`;

[...lista].reverse().forEach(item => {
html += `
<tr>
<td>${item.data}</td>
<td>${item.tipo}</td>
<td>${item.usuario}</td>
<td>${item.material}</td>
<td>${item.quantidade}</td>
</tr>
`;
});

html += `</table>`;

document.getElementById('areaRelatorio').innerHTML = html;
}

function limparRelatorio(){

let senha = document.getElementById('senha').value;

if(senha != "1418"){
alert("Digite a senha correta!");
return;
}

if(!confirm("Deseja apagar tudo?")) return;

localStorage.removeItem('estoque');
document.getElementById('areaRelatorio').innerHTML = "";

alert("Relatório apagado!");
}

function exportarExcel(){

let lista = JSON.parse(localStorage.getItem('estoque')) || [];

if(lista.length === 0){
alert("Não há dados para exportar!");
return;
}

// CSV
let csv = "Data;Tipo;Usuario;Material;Quantidade\n";

lista.forEach(item => {
csv += `${item.data};${item.tipo};${item.usuario};${item.material};${item.quantidade}\n`;
});

let blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });

let link = document.createElement("a");

let url = URL.createObjectURL(blob);

link.setAttribute("href", url);
link.setAttribute("download", "relatorio_estoque.csv");

document.body.appendChild(link);
link.click();
document.body.removeChild(link);
}

</script>

</body>
</html>
